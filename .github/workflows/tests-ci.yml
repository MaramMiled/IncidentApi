name: .NET CI Pipeline

on:
  push:
    branches: [ "main" , "master" ]
  pull_request:
    branches: [ "main" , "master" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Maram.sln

      - name: Build project
        run: dotnet build Maram.sln --no-restore

      - name: Run tests
        run: dotnet test Maram.sln --no-build --verbosity normal